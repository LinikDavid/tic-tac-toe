<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Крестики-нолики</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
      margin-top: 20px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5em;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .cell:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }

    .cell:active {
      transform: scale(0.95);
    }

    .status {
      margin-top: 20px;
      font-size: 1.3em;
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: rgb(168, 155, 155);
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    }

    button:active {
      transform: translateY(1px);
    }

    .cell.winning{
      background: rgba(243, 5, 152, 0.3) !important;
      border: 2px solid #6e00c9;
      box-shadow: 0 0 25px #2ecc71;
      transform: scale(1.08);
      animation: winPulse 1.5s ease-in-out infinite;
    }

    @keyframes winPulse {
      0%, 100% { transform: scale(1.08); }
      50% { transform: scale(1.12); }
    }
  </style>
</head>
<body>

<h1>Крестики-нолики</h1>

<div class="board" id="board"></div>
<div class="status" id="status">Ход: X</div>
<button onclick="resetGame()">Перезапустить</button>

<script>
  const board = document.getElementById('board');
  const statusText = document.getElementById('status');

  let currentPlayer = 'X';
  let cells = Array(9).fill(null);
  let gameActive = true;

  function createBoard() {
    board.innerHTML = '';
    cells.forEach((_, index) => {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.addEventListener('click', () => handleMove(index));
      board.appendChild(cell);
    });
  }

  function handleMove(index) {
    if (!gameActive || cells[index]) return;

    cells[index] = currentPlayer;
    updateBoard();

    if (checkWinner()) {
      statusText.textContent = `Победил: ${currentPlayer}`;
      gameActive = false;
      return;
    }

    if (!cells.includes(null)) {
      statusText.textContent = 'Ничья!';
      gameActive = false;
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusText.textContent = `Ход: ${currentPlayer}`; 
  }

  function updateBoard() {
    const allCells = document.querySelectorAll('.cell');
    allCells.forEach((cell, i) => {
      cell.textContent = cells[i];
    });
  }

  function checkWinner() {
    const winPatterns = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];

    for (const pattern of winPatterns) {
      const [a, b, c] = pattern;
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
        winingLine([a, b, c]);
        return true;
      }
    }
    return false;
  }

  function winingLine(indices){ 
    const allCells = document.querySelectorAll('.cell');

    indices.forEach(index =>{
      allCells[index].classList.add('winning');
    });
  }

  function resetGame() {
    cells = Array(9).fill(null);
    currentPlayer = 'X';
    gameActive = true;
    statusText.textContent = 'Ход: X';

    document.querySelectorAll('.cell').forEach(cell => {
      cell.classList.remove('winning');
    });

    createBoard();
  }

  createBoard();
</script>

</body>
</html>
